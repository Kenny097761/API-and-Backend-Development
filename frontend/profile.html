<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./css/profile.css">
    <link rel="stylesheet" href="./css/welcome.css">
</head>

<body>
    <main>
        <div class="profile-page">
            <!-- Back button -->
            <div class="welcome-card-actions">
                <a href="./welcome.html" class="secondary-button">Back</a>
            </div>
            <section class="profile-section">
                <h1 class="profile-heading">Profile</h1>
                <!-- Profile table -->
                <table class="profile-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Email</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="userId"></td>
                            <td id="email"></td>
                            <td id="firstName"></td>
                            <td id="lastName"></td>
                            <td id="status"></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <!-- Profile JavaScript -->
    <script src="./js/profile.js"></script>
</body>

</html>
