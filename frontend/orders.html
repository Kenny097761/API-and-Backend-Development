<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Orders - IoTBay</title>
    <link rel="stylesheet" href="./css/orders.css">
</head>

<body>
    <div class="container">
        <div class="top-bar">
            <a href="/welcome.html" id="homeLink" class="home-link">Home</a>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <h1>Order Management</h1>

        <div id="searchSection" style="display: none;" class="search-section">
            <input type="number" id="searchOrderId" placeholder="Search by Order ID" min="1">
            <input type="date" id="searchDate" placeholder="Search by Date">
            <button id="searchBtn">Search</button>
            <button id="clearSearchBtn">Clear</button>
        </div>

        <!-- Create Order(customers only with JS) -->
        <div id="createOrderSection" style="display: none;">
            <button id="showFormBtn">+ Create New Order</button>

            <div id="orderForm" style="display: none;" class="order-form">
                <h2>New Order</h2>
                <div id="devicesList"></div>
                <div id="cartSection">
                    <h3>Your Cart</h3>
                    <div id="cartItems"></div>
                    <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
                    <div class="form-buttons">
                        <button id="submitOrderBtn">Submit Order</button>
                        <button id="cancelFormBtn">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <h2 id="ordersTitle">Orders</h2>
        <div id="ordersList" class="orders-list"></div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
    </div>

    <script src="./js/orders-orderitem.js"></script>
    <script src="./js/orders-main.js"></script>
</body>

</html>
