<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - IoTBay</title>
    <link rel="stylesheet" href="./css/register.css">
</head>
<body>
    <div class="register-box">
        <h2 class="register-heading">Register to IoTBay</h2>
        <p class="register-subtitle">Create your account to start shopping on IoTBay Marketplace.</p>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First name">
                <div class="error" id="firstNameError">First name is required</div>
            </div>

            <div class="input-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last name">
                <div class="error" id="lastNameError">Last name is required</div>
            </div>
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="me@example.com">
                <div class="error" id="emailError">Invalid email</div>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters">
                <div class="error" id="passwordError">Password too short</div>
            </div>
            
            <button type="submit">Register</button>
        </form>
        
        <div class="login-link">
            <a href="./login.html">Already have an account? Login</a>
        </div>
    </div>

    <script src="./js/register.js"></script>
</body>
</html>
